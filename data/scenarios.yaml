scenarios:
  gaming:
    description: "Gaming"
    require_confirmation: false
    steps:
      - type: "health_check"
      - type: "ping_check"
      - type: "open_app"
        app: "steam"
      - type: "open_app"
        app: "discord"

  stream:
    description: "Streaming"
    require_confirmation: false
    steps:
      - type: "open_app"
        app: "obs"
      - type: "open_app"
        app: "discord"
      - type: "open_app"
        app: "chrome"

  night:
    description: "Night mode"
    require_confirmation: false
    steps:
      - type: "open_app"
        app: "spotify"

  work:
    description: "Work"
    require_confirmation: true
    steps:
      - type: "open_app"
        app: "chrome"

  afk:
    description: "AFK"
    require_confirmation: true
    steps:
      - type: "show_heavy_apps"